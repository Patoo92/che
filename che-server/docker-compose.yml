version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: che-ollama
    restart: unless-stopped
    volumes:
      - /mnt/che/models:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=2
    deploy:
      resources:
        limits:
          memory: 3g
        reservations:
          memory: 2g

  postgres:
    image: pgvector/pgvector:pg16
    container_name: che-postgres
    restart: unless-stopped
    volumes:
      - /mnt/che/pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_DB=che_brain
      - POSTGRES_USER=che
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: che-backend
    restart: unless-stopped
    depends_on:
      - ollama
      - postgres
    ports:
      - "100.x.x.x:8000:8000"
    volumes:
      - /mnt/che/brain:/mnt/che/brain
      - /mnt/che/logs:/mnt/che/logs
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - LLM_MODEL=qwen2.5:1.5b
      - EMBED_MODEL=nomic-embed-text
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=che_brain
      - POSTGRES_USER=che
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - BACKEND_PORT=8000
      - DEBUG_MODE=False
      - BRAIN_PATH=/mnt/che/brain
      - SEARCH_PROVIDER=duckduckgo
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: che-webui
    restart: unless-stopped
    depends_on:
      - ollama
    ports:
      - "127.0.0.1:3000:8080"
    volumes:
      - /mnt/che/brain:/mnt/che/brain:ro
      - open-webui-data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_NAME=CHE Brain
      - ENABLE_SIGNUP=false
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m

volumes:
  open-webui-data:
