services:
  ollama:
    image: ollama/ollama:latest
    container_name: che-ollama
    restart: unless-stopped
    volumes:
      - /home/che/data/models:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=2
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 1g

  postgres:
    image: pgvector/pgvector:pg16
    container_name: che-postgres
    restart: unless-stopped
    volumes:
      - /home/che/data/pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_DB=che_brain
      - POSTGRES_USER=che
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: che-backend
    restart: unless-stopped
    depends_on:
      - ollama
      - postgres
    ports:
      - "${BIND_ADDRESS:-100.78.234.8}:8000:8000"
    volumes:
      - /home/che/data/brain:/home/che/data/brain
      - /home/che/data/logs:/home/che/data/logs
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - LLM_MODEL=qwen2.5:1.5b
      - EMBED_MODEL=nomic-embed-text
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=che_brain
      - POSTGRES_USER=che
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - BACKEND_PORT=8000
      - DEBUG_MODE=False
      - BRAIN_PATH=/home/che/data/brain
      - SEARCH_PROVIDER=duckduckgo
      - WS_SECRET=${WS_SECRET}
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 512m

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: che-webui
    restart: unless-stopped
    depends_on:
      - ollama
    ports:
      - "${BIND_ADDRESS:-100.78.234.8}:3000:8080"
    volumes:
      - /home/che/data/brain:/home/che/data/brain:ro
      - open-webui-data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_NAME=CHE Brain
      - ENABLE_SIGNUP=false
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 512m

volumes:
  open-webui-data:
